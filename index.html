    <style>
        /* 自定义滚动条样式 */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1; 
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }

        /* 股票涨跌颜色 (中国股市：红涨绿跌) */
        .text-up { color: #ef4444; }
        .text-down { color: #22c55e; }
        .bg-up { background-color: #ef4444; }
        .bg-down { background-color: #22c55e; }
        .border-up { border-color: #ef4444; }
        .border-down { border-color: #22c55e; }

        /* 加载动画 */
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3b82f6;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Toast 消息样式 */
        .toast {
            visibility: hidden;
            min-width: 250px;
            background-color: #333;
            color: #fff;
            text-align: center;
            border-radius: 8px;
            padding: 12px;
            position: fixed;
            z-index: 50;
            left: 50%;
            bottom: 30px;
            transform: translateX(-50%);
            opacity: 0;
            transition: opacity 0.3s, bottom 0.3s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .toast.show {
            visibility: visible;
            opacity: 1;
            bottom: 50px;
        }
    </style>
</head>

        // 生成模拟K线数据 (基于当前价格和趋势)
        function generateMockChartData(basePrice, trend, days = 60) {
            let data = [];
            let volumeData = [];
            let dates = [];
            let price = basePrice;
            
            // 如果趋势是 down，从高处开始；如果是 up，从低处开始
            if (trend === "down") price = basePrice * 1.2;
            else if (trend === "up") price = basePrice * 0.8;

            const now = new Date();
            
            for (let i = days; i > 0; i--) {
                let date = new Date(now);
                date.setDate(date.getDate() - i);
                dates.push([date.getMonth() + 1, date.getDate()].join('/'));

                // 随机波动
                let volatility = price * 0.05;
                let open = price + (Math.random() - 0.5) * volatility;
                let close = open + (Math.random() - 0.5) * volatility;
                let low = Math.min(open, close) - Math.random() * volatility * 0.5;
                let high = Math.max(open, close) + Math.random() * volatility * 0.5;
                
                // 确保最后一天接近 basePrice
                if (i === 1) {
                    close = basePrice;
                    open = basePrice + (Math.random() - 0.5) * (basePrice * 0.02);
                    low = Math.min(open, close);
                    high = Math.max(open, close);
                } else {
                    // 趋势修正
                    if (trend === "down" && i < 10) close -= Math.random() * volatility; // 近期下跌
                    if (trend === "up" && i < 10) close += Math.random() * volatility; // 近期上涨
                }

                data.push([open.toFixed(2), close.toFixed(2), low.toFixed(2), high.toFixed(2)]);
                
                // 成交量
                let vol = Math.floor(Math.random() * 1000000) + 500000;
                volumeData.push(vol);
                
                price = close;
            }
            return { dates, data, volumeData };
        }

        // 计算预测
        function calculatePrediction(stockCode) {
            const stock = BASE_DATA[stockCode];
            if (!stock) return "neutral";

            // 计算新闻总分
            let totalWeight = 0;
            stock.news.forEach(n => totalWeight += n.weight);
            let avgWeight = stock.news.length > 0 ? totalWeight / stock.news.length : 0;

            // 逻辑：新闻权重总分>20分且趋势向上则预测上涨，否则中性或下跌
            // 注意：题目描述“新闻权重总分>20分”，这里理解为平均分或者总和，通常新闻条数多总和肯定大。
            // 根据上下文，应该是指“高权重新闻较多”或者“平均权重”。
            // 假设逻辑为：平均分 > 25 且 趋势向上 -> 预测上涨
            
            if (avgWeight > 25 && stock.trend === "up") {
                return "up";
            } else if (avgWeight > 25 && stock.trend === "down") {
                return "neutral"; // 多空博弈
            } else if (stock.trend === "down") {
                return "down";
            } else {
                return "neutral";
            }
        }

                let predIcon = "";

                    predText = "看涨";
                    predClass = "bg-red-100 text-red-700 border-red-200";
                    predIcon = "<i class='fa-solid fa-arrow-trend-up'></i>";
                } else if (prediction === "down") {
                    predText = "看跌";
                    predClass = "bg-green-100 text-green-700 border-green-200";
                    predIcon = "<i class='fa-solid fa-arrow-trend-down'></i>";
                } else {
                    predText = "中性";
                    predClass = "bg-gray-100 text-gray-700 border-gray-200";
                    predIcon = "<i class='fa-solid fa-minus'></i>";
                }

                // 价格颜色
                const priceColor = stock.changePct >= 0 ? "text-up" : "text-down";
                const priceSign = stock.changePct >= 0 ? "+" : "";

                // 生成图表数据
                const chartData = generateMockChartData(stock.price, stock.trend);

                // 构建新闻列表 HTML
                const newsHtml = stock.news.map(n => {
                    const weightClass = n.weight >= 27 ? "border-l-4 border-red-500 bg-red-50" : "border-l-4 border-slate-300";
                    const scoreBadge = n.weight >= 27 
                        ? `<span class="bg-red-500 text-white text-xs px-2 py-0.5 rounded-full font-bold">${n.weight}分</span>` 
                        : `<span class="bg-slate-400 text-white text-xs px-2 py-0.5 rounded-full">${n.weight}分</span>`;
                    
                    return `
                        <div class="p-3 mb-2 ${weightClass} rounded shadow-sm hover:shadow-md transition">
                            <div class="flex justify-between items-start mb-1">
                                <h4 class="font-bold text-sm text-slate-800 leading-snug flex-1 pr-2">${n.title}</h4>
                                ${scoreBadge}
                            </div>
                            <p class="text-xs text-slate-600 mb-2 line-clamp-2">${n.summary}</p>
                            <div class="flex justify-between items-center text-xs text-slate-400">
                                <span>${n.source}</span>
                                <span>${n.date}</span>
                            </div>
                        </div>
                    `;
                }).join('');

                // 创建卡片 DOM
                const card = document.createElement('div');
                card.className = "bg-white rounded-xl shadow-lg border border-slate-100 overflow-hidden";
                card.innerHTML = `
                    <div class="p-6 border-b border-slate-100 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                        <div>
                            <div class="flex items-center gap-3">
                                <h2 class="text-2xl font-bold text-slate-800">${stock.name}</h2>
                                <span class="bg-slate-100 text-slate-500 px-2 py-1 rounded text-sm font-mono">${code}</span>
                                <span class="${predClass} px-3 py-1 rounded-full text-sm font-bold border flex items-center gap-1">
                                    ${predIcon} AI预测: ${predText}
                                </span>
                            </div>
                            <div class="mt-2 flex items-baseline gap-3">
                                <span class="text-3xl font-bold ${priceColor}">${stock.price.toFixed(2)}</span>
                                <span class="text-sm ${priceColor} font-medium">(${priceSign}${stock.changePct}%)</span>
                            </div>
                        </div>
                        <button onclick="deleteStock('${code}')" class="text-slate-400 hover:text-red-500 transition px-3 py-2 rounded-lg hover:bg-red-50">
                            <i class="fa-solid fa-trash-can mr-1"></i> 删除
                        </button>
                    </div>

                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-0 lg:divide-x divide-slate-100">
                        <!-- 左侧：图表区 (占2列) -->
                        <div class="lg:col-span-2 p-4">
                            <h3 class="text-sm font-bold text-slate-700 mb-3 flex items-center gap-2">
                                <i class="fa-solid fa-chart-candlestick text-blue-500"></i> K线走势与成交量
                            </h3>
                            <div id="chart-${code}" class="w-full h-[350px]"></div>
                        </div>

                        <!-- 右侧：新闻与分析 (占1列) -->
                        <div class="lg:col-span-1 bg-slate-50/50 p-4 flex flex-col h-full max-h-[500px] overflow-hidden">
                            <!-- Tabs -->
                            <div class="flex border-b border-slate-200 mb-4">
                                <button onclick="switchTab('${code}', 'news')" id="tab-news-${code}" class="flex-1 pb-2 text-sm font-medium text-blue-600 border-b-2 border-blue-600">新闻情报</button>
                                <button onclick="switchTab('${code}', 'analysis')" id="tab-analysis-${code}" class="flex-1 pb-2 text-sm font-medium text-slate-500 hover:text-slate-700">深度分析</button>
                            </div>

                            <!-- News Content -->
                            <div id="content-news-${code}" class="flex-1 overflow-y-auto pr-1 custom-scrollbar">
                                ${newsHtml}
                            </div>

                            <!-- Analysis Content (Hidden by default) -->
                            <div id="content-analysis-${code}" class="hidden flex-1 overflow-y-auto pr-1 text-sm text-slate-700 space-y-4">
                                <div>
                                    <h4 class="font-bold text-slate-900 mb-1"><i class="fa-solid fa-building mr-1"></i> 公司基本面</h4>
                                    <p class="leading-relaxed">${stock.analysis.basics}</p>
                                </div>
                                <div>
                                    <h4 class="font-bold text-slate-900 mb-1"><i class="fa-solid fa-coins mr-1"></i> 财务数据</h4>
                                    <p class="leading-relaxed">${stock.analysis.financial}</p>
                                </div>
                                <div>
                                    <h4 class="font-bold text-slate-900 mb-1"><i class="fa-solid fa-trophy mr-1"></i> 行业地位</h4>
                                    <p class="leading-relaxed">${stock.analysis.industry}</p>
                                </div>
                            </div>
                        </div>
                    </div>
                `;

                container.appendChild(card);

                // 初始化 ECharts
                initChart(code, chartData);
            });
        }

        function initChart(code, data) {
            const chartDom = document.getElementById(`chart-${code}`);
            const myChart = echarts.init(chartDom);
            
            const option = {
                tooltip: {
                    trigger: 'axis',
                    axisPointer: { type: 'cross' }
                },
                grid: [
                    { left: '10%', right: '8%', height: '55%' },
                    { left: '10%', right: '8%', top: '70%', height: '15%' }
                ],
                xAxis: [
                    { data: data.dates, scale: true, boundaryGap: false, axisLine: { onZero: false }, splitLine: { show: false }, min: 'dataMin' },
                    { type: 'category', gridIndex: 1, data: data.dates, axisLabel: { show: false } }
                ],
                yAxis: [
                    { scale: true, splitArea: { show: true } },
                    { gridIndex: 1, splitNumber: 2, axisLabel: { show: false }, axisLine: { show: false }, splitLine: { show: false } }
                ],
                dataZoom: [
                    { type: 'inside', xAxisIndex: [0, 1], start: 50, end: 100 },
                    { show: true, xAxisIndex: [0, 1], type: 'slider', top: '90%', start: 50, end: 100 }
                ],
                series: [
                    {
                        name: 'K线',
                        type: 'candlestick',
                        data: data.data,
                        itemStyle: {
                            color: '#ef4444', // 阳线红
                            color0: '#22c55e', // 阴线绿
                            borderColor: '#ef4444',
                            borderColor0: '#22c55e'
                        }
                    },
                    {
                        name: '成交量',
                        type: 'bar',
                        xAxisIndex: 1,
                        yAxisIndex: 1,
                        data: data.volumeData,
                        itemStyle: {
                            color: function(params) {
                                // 简单逻辑：根据K线颜色对应成交量颜色
                                const dataIndex = params.dataIndex;
                                // 注意：这里简化处理，实际应匹配K线开收
                                return dataIndex % 2 === 0 ? '#ef4444' : '#22c55e'; 
                            }
                        }
                    }
                ]
            };

            myChart.setOption(option);
            
            // 响应式调整
            window.addEventListener('resize', () => {
                myChart.resize();
            });
        }

        // ================= 交互逻辑 =================

        function switchTab(code, type) {
            const newsBtn = document.getElementById(`tab-news-${code}`);
            const analysisBtn = document.getElementById(`tab-analysis-${code}`);
            const newsContent = document.getElementById(`content-news-${code}`);
            const analysisContent = document.getElementById(`content-analysis-${code}`);

            if (type === 'news') {
                newsBtn.className = "flex-1 pb-2 text-sm font-medium text-blue-600 border-b-2 border-blue-600";
                analysisBtn.className = "flex-1 pb-2 text-sm font-medium text-slate-500 hover:text-slate-700";
                newsContent.classList.remove('hidden');
                analysisContent.classList.add('hidden');
            } else {
                analysisBtn.className = "flex-1 pb-2 text-sm font-medium text-blue-600 border-b-2 border-blue-600";
                newsBtn.className = "flex-1 pb-2 text-sm font-medium text-slate-500 hover:text-slate-700";
                analysisContent.classList.remove('hidden');
                newsContent.classList.add('hidden');
            }
        }

        function deleteStock(code) {
            if (confirm(`确定要删除 ${BASE_DATA[code].name} (${code}) 的分析吗？`)) {
                appState.stocks = appState.stocks.filter(s => s !== code);
                renderStocks();
                showToast("股票已删除");
            }
        }

        function addNewStock() {
            const input = document.getElementById('stock-input');
            const code = input.value.trim();

            if (!code) {
                showToast("请输入股票代码");
                return;
            }

            if (appState.stocks.includes(code)) {
                showToast("该股票已在列表中");
                return;
            }

            // 模拟添加新股票的数据
            if (!BASE_DATA[code]) {
                // 如果不是预设的三只股票，生成模拟数据
                BASE_DATA[code] = {
                    name: "模拟股票" + code.substring(code.length - 3),
                    price: (Math.random() * 50 + 10).toFixed(2),
                    changePct: (Math.random() * 10 - 5).toFixed(2),
                    trend: Math.random() > 0.5 ? "up" : "down",
                    analysis: {
                        basics: "这是用户动态添加的股票，系统正在进行实时数据模拟。基本面分析正在生成中...",
                        financial: "财务数据获取中...模拟营收增长稳定。",
                        industry: "所属行业分析中..."
                    },
                    news: [
                        { title: "模拟新闻：公司发布最新战略规划", source: "模拟财经", date: "2026-03-04", weight: 26, summary: "公司宣布将加大研发投入，拓展新兴市场。" },
                        { title: "模拟新闻：机构调研报告", source: "模拟证券", date: "2026-03-03", weight: 24, summary: "多家机构给予买入评级。" }
                    ]
                };
            }

            appState.stocks.push(code);
            renderStocks();
            input.value = '';
            showToast(`成功添加股票: ${code}`);
        }

        // ================= 初始化 =================

        window.onload = function() {
            // 模拟时间更新
            const now = new Date();
            const timeString = now.getFullYear() + '-' + 
                               String(now.getMonth() + 1).padStart(2, '0') + '-' + 
                               String(now.getDate()).padStart(2, '0') + ' ' + 
                               String(now.getHours()).padStart(2, '0') + ':' + 
                               String(now.getMinutes()).padStart(2, '0');
            
            document.getElementById('update-time').innerHTML = `<i class="fa-regular fa-clock mr-1"></i> 数据更新时间: ${timeString} (模拟)`;

            renderStocks();
        };

    </script>
</body>
</html>
